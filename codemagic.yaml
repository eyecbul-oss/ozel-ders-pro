workflows:
  android-apk:
    name: Özel Ders Pro Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter platform dosyalarını tamamla
        script: flutter create .
      - name: Paketleri yükle
        script: flutter pub get
      - name: APK üret
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
